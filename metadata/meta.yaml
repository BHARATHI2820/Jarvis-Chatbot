      - nl: "How many approved loans do we have?"
        sql: "SELECT COUNT(loannumber) FROM stage.loan_main_2024 WHERE decisionid IS NOT NULL;"

relationships:
  - "When filtering funded vs not funded applications, NEVER use subqueries (NOT IN / IN). Always use a LEFT JOIN to stage.loan_main_2024 and check for NULL loan fields."
  - description: "Join rule between application-level and loan-level data."
    join_policies:
      - name: application_to_loan_join
        scope:
          tables:
            - stage.app_main_2024
            - stage.loan_main_2024
        description: >
          Mandatory and exclusive join rule between application-level and loan-level data.
          This rule must be enforced for all queries that join these two tables.
        allowed_join:
          left_table: stage.app_main_2024
          left_column: applicationid
          right_table: stage.loan_main_2024
          right_column: loannumber
          condition: "stage.app_main_2024.applicationid = stage.loan_main_2024.loannumber"
        forbidden_columns:
          - stage.loan_main_2024.customerid
        forbidden_practices:
          - joining on customerid
          - casting columns to force a join
          - using alternative join keys
          - using multiple columns for the join
          - implicit joins without an ON clause
        enforcement_rules:
          - Any query joining stage.app_main_2024 and stage.loan_main_2024 MUST use the allowed_join condition.
          - Queries that use any forbidden_columns for joining are invalid.
          - Queries that cast join columns to bypass type mismatches are invalid.
          - Queries violating this rule must be rejected even if they execute successfully.
        rationale:
          - applicationid and loannumber represent the same business entity.
          - customerid represents a customer entity and must not be used as a transactional join key.
          - Incorrect joins cause row duplication, inflated aggregates, and invalid analytics.
        validation_checks:
          - Joined row count must not exceed the row count of either base table.
          - Joined row count must not be zero unless explicitly expected.

