    rules:
      - "Approved loan = decisionid IS NOT NULL."
      - "Never use decision_status; use decision_source or decisionid."
      - "Use fundeddate for origination trend unless business says otherwise."
      - "COLUMNS ENDING WITH '_full' ARE FORBIDDEN AND MUST NEVER BE USED IN GENERATED SQL UNLESS THE USER EXPLICITLY MENTIONS THE '_full' COLUMN NAME IN THE QUESTION."
      - "arix_probabilityofbad is character varying and may contain invalid values (e.g., 'A', 'N/A'). ALWAYS validate it with: CASE WHEN arix_probabilityofbad ~ '^[0-9.]+$' THEN arix_probabilityofbad::numeric ELSE NULL END"
      - "When calculating expected_charge_off, use: amountfinanced * NULLIF(valid_numeric_probability, 0)"
      - "When filtering funded vs not funded applications, NEVER use subqueries (NOT IN / IN). Always use a LEFT JOIN to stage.loan_main_2024 and check for NULL loan fields."
      - "When both stage.app_main_2024 and stage.loan_main_2024 are needed, ALWAYS use explicit JOIN: stage.app_main_2024.applicationid = stage.loan_main_2024.loannumber"
      - "NEVER use IN (SELECT ...) or EXISTS subqueries for table relationships. Use JOIN instead."
      - "CRITICAL: Column names MUST match EXACTLY as defined in the metadata. NEVER invent, guess, or use similar-sounding column names."
      - "Examples of forbidden hallucinations:"
      - "  Do NOT use 'interestrate' — correct column is 'intrate' in loan_main_2024"
      - "  Do NOT use 'interest_rate' or 'rate' — use only 'intrate'"
      - "  Do NOT use 'fico_score' — correct is 'fico'"
      - "  Do NOT use 'channel' — correct is 'channel_code', 'channel_name', etc."
      - "If a requested metric (e.g., interest rate) is not available under the exact column name, do NOT assume or create a column. Return CANNOT_ANSWER if the exact column is missing."
      - "Always use the exact column names from the columns list: intrate, apr, originationfee, amountfinanced, etc."
      - "CRITICAL: Column ownership is strict and MUST be respected at all times."
      - "decision_status exists ONLY in stage.app_main_2024 — NEVER reference it from stage.loan_main_2024"
      - "decision_source exists in BOTH tables — when needed for funded loans, use loan_main_2024.decision_source"
      - "decisionid exists in BOTH tables — non-null in loan_main_2024 means funded/approved"
      - "NEVER use app_main_2024 columns (like decision_status, applicationstatus_*, etc.) when filtering or grouping on loan_main_2024 data unless explicitly joined and qualified."
      - "For fraud-related queries on funded loans:"
      - "  There is NO direct 'fraud' flag in loan_main_2024"
      - "  Fraud detection happens at application stage — use app_main_2024 columns via JOIN if needed"
      - "  Common fraud indicators in app_main_2024: decision_declined_reason*, fraudspecialist_id, appnotes containing fraud keywords"
      - "If user asks for 'fraud loans' or 'suspected fraud' on funded loans and no direct column exists in loan_main_2024 → return CANNOT_ANSWER or suggest alternative (e.g., declined applications)"
      - "CRITICAL: vantage4 in stage.loan_main_2024 is of type INTEGER — it is a clean numeric column containing only valid integers."
      - "NEVER apply regex matching (~ operator), string validation, or casting to numeric on vantage4."
      - "Forbidden patterns (must NEVER generate):"
      - "  - vantage4 ~ '^[0-9.]+$'"
      - "  - vantage4::numeric"
      - "  - CASE WHEN vantage4 ~ ... THEN vantage4::numeric ELSE NULL END"
      - "Always use vantage4 directly in aggregations and calculations:"
      - "  Correct: AVG(vantage4), SUM(vantage4), vantage4 > 700, etc."
      - "  Correct: AVG(loan.vantage4) AS avg_vantage_score"
      - "CRITICAL: NEVER generate regex validation (~ operator) or CASE cleaning for arix_probabilityofbad in expected charge-off calculations."
      - "Forbidden patterns (must NEVER appear in any generated SQL):"
      - "  - arix_probabilityofbad ~ '^[0-9.]+$'"
      - "  - arix_probabilityofbad ~ '^[0-9.]+$'"
      - "  - CASE WHEN arix_probabilityofbad ~ ... THEN arix_probabilityofbad::numeric ELSE NULL END"
      - "  - Any use of ~ or regex on arix_probabilityofbad"
      - "For expected charge-off calculations:"
      - "ALWAYS use direct multiplication: amountfinanced * arix_probabilityofbad::numeric"
      - "Correct formula: SUM(loan.amountfinanced * loan.arix_probabilityofbad::numeric)"
      - "Invalid values will become NULL automatically when cast fails, and SUM ignores NULLs — no manual cleaning needed."
      - "Example correct usage:"
      - "SUM(loan.amountfinanced * loan.arix_probabilityofbad::numeric) AS expected_charge_off"
      - "If bad data causes issues, fix at ETL level — never add regex in ad-hoc queries."
      - "CRITICAL: To calculate months between two dates (e.g., Months on Book / MOB):"
      - "  NEVER use: EXTRACT(MONTH FROM (date1 - date2)) — this returns integer days and causes 'extract(unknown, integer)' error."
      - "  ALWAYS use: EXTRACT(MONTH FROM AGE(date1, date2))"
      - "  Correct examples:"
      - "    EXTRACT(MONTH FROM AGE(CURRENT_DATE, applicationdate))"
      - "    EXTRACT(MONTH FROM AGE(reportdate, fundeddate)) AS mob"
      - "  Alternative exact month count:"
      - "    (EXTRACT(YEAR FROM date1)*12 + EXTRACT(MONTH FROM date1)) - (EXTRACT(YEAR FROM date2)*12 + EXTRACT(MONTH FROM date2))"

      - "CRITICAL: income_amount exists ONLY in stage.app_main_2024 — NEVER reference it from stage.loan_main_2024"
      - "Forbidden: loan.income_amount, lm.income_amount"
      - "Correct: app.income_amount or am.income_amount"
      - "income_amount is verified income at application time — use from app_main_2024 even when analyzing funded loans."
      - "Other application-only columns that must NEVER be used from loan_main_2024:"
      - "  - stated_grossmonthlyincome"
      - "  - income_source"
      - "  - employment_status"
      - "  - decision_status"
      - "CRITICAL: EVERY percentage or rate calculation MUST be protected against division by zero."
      - "NEVER write: numerator / denominator * 100"
      - "ALWAYS use one of these safe patterns:"
      - "  - COALESCE(numerator / NULLIF(denominator, 0), 0.0) * 100"
      - "  - CASE WHEN denominator > 0 THEN (numerator::numeric / denominator) * 100 ELSE 0.0 END"
      - "This applies to ALL rates and percentages including:"
      - "  - Approval rate, funding rate, charge-off rate"
      - "  - % of loans with PD > threshold (like > 0.3)"
      - "  - % with positive arix_probabilityofbad"
      - "  - Any COUNT(...) / COUNT(...) calculation"
      - "If no rows match the filter, return 0.0 — never allow division by zero."
      - arix_probabilityofbad is character varying (text) — it is the ONLY column that requires casting to numeric."
      - "To use arix_probabilityofbad in comparisons or math:"
      - "  ALWAYS cast it: arix_probabilityofbad::numeric"
      - "  Correct: arix_probabilityofbad::numeric > 0.3"
      - "  Correct: amountfinanced * arix_probabilityofbad::numeric"
      - "  Forbidden: arix_probabilityofbad > 0.3 (direct comparison — causes operator error)"
      - "Invalid text values become NULL on cast — no need for regex cleaning in most cases."
      - "For percentages involving arix_probabilityofbad:"
      - "  Always use COUNT(CASE WHEN arix_probabilityofbad::numeric > X THEN 1 END)"
      - "  Always protect division: COALESCE(... / NULLIF(COUNT(*), 0), 0.0) * 100"


