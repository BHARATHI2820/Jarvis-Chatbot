rules:
      # ========================================
      # DATA COVERAGE CONTEXT
      # ========================================
      - "DATABASE COVERAGE: July 2023 - December 2024 (applications), January 2024 - February 2025 (funded loans)"
      - "Most complete data period: January 2024 - December 2024"
      - "When user asks about 'last quarter', 'recent data', or relative time periods, refer to the most recent complete period in the dataset."
      
      # ========================================
      # CORE SQL GENERATION RULES
      # ========================================
      - "Use decision_source instead of decision_status when determining approval logic."
      - "Do NOT use submitted_date under any circumstance."
      - "PostgreSQL does NOT support INTERVAL 'quarter'."
      - "Always replace 1 quarter with INTERVAL '3 months'."
      - "Always replace 1 year with INTERVAL '12 months'."
      - "Any SQL using INTERVAL 'quarter' is INVALID and must be rewritten."
      - "sql = sql.replace(\"≥\", \" >=\").replace(\"≤\", \"<=\")"
      
      # ========================================
      # DATE COLUMN SELECTION RULES
      # ========================================
      - "Always use one of the following date columns ONLY, based on context:"
      - "  - applicationdate for application volume / submission trends"
      - "  - applicationinitiateddate for first application timing"
      - "  - applicationapprovaldate for approval-related metrics"
      - "  - fundeddate for funding metrics (from loan_main_2024 table)"
      
      # ========================================
      # DATE INTERPRETATION RULES FOR HISTORICAL DATA
      # ========================================
      - "When user mentions relative time periods (last quarter, last month, Q4, etc.):"
      - "  - 'last quarter' or 'Q4' = Q4 2024 (Oct-Dec 2024): '2024-10-01' to '2024-12-31'"
      - "  - 'Q3 2024' = Jul-Sep 2024: '2024-07-01' to '2024-09-30'"
      - "  - 'Q2 2024' = Apr-Jun 2024: '2024-04-01' to '2024-06-30'"
      - "  - 'Q1 2024' = Jan-Mar 2024: '2024-01-01' to '2024-03-31'"
      - "  - 'last month' = December 2024: '2024-12-01' to '2024-12-31'"
      - "ALWAYS use explicit date literals (e.g., '2024-10-01'), NEVER use CURRENT_DATE for historical data queries."
      - "ALWAYS include BOTH lower AND upper date bounds in WHERE clauses."
      - "When user asks about trends or 'dip in volume', generate GROUP BY queries with monthly aggregation."
      
      # ========================================
      # CRITICAL: CHANNEL FILTERING RULES (DTM/DTC/FSL)
      # ========================================
      - "MANDATORY: For all channel-based filtering (DTM, DTC, FSL), ALWAYS use channel_group with ILIKE pattern matching."
      - "NEVER use channel_code for filtering DTM/DTC/FSL under ANY circumstance."
      - "Channel filtering standard syntax:"
      - "  - For DTM: WHERE channel_group ILIKE '%DTM%'"
      - "  - For DTC: WHERE channel_group ILIKE '%DTC%'"
      - "  - For FSL: WHERE channel_group ILIKE '%FSL%'"
      - "Rationale: channel_group contains the hierarchical channel classification. channel_code is internal and unreliable."
      - "FSL = Fresh Start Lending, DTM = Direct to Merchant, DTC = Direct to Consumer"
      - "NEVER use channel_product or channel_code to filter by DTM/DTC/FSL."
      - "When user mentions 'DTM applications', 'FSL loans', 'DTC volume' → ALWAYS use channel_group ILIKE."
      
      # ========================================
      # INCOME COLUMN USAGE RULES
      # ========================================
      - "Income-related questions MUST use income_amount."
      - "NEVER use stated_grossmonthlyincome for calculations, aggregation, correlation, averages, sums, or comparisons."
      - "stated_grossmonthlyincome is VARCHAR and may only be used for display or filtering, never for math."
      
      # ========================================
      # TABLE ALIAS & QUALIFICATION RULES
      # ========================================
      - "When multiple tables are used, ALL column references must be fully qualified with table aliases."
      - "If a column exists in both app_main_2024 and loan_main_2024 (e.g., channel_group, channel_code), always use app_main_2024 unless explicitly stated otherwise."
      - "If a column exists in more than one table, ALWAYS prefix it with the table alias."
      - "Never use unqualified column names when joins are present."
      - "CRITICAL: When joining stage.app_main_2024 and stage.loan_main_2024, NEVER use unqualified column names in SELECT, GROUP BY, ORDER BY, or WHERE clauses."
      - "The following columns exist in BOTH tables and MUST ALWAYS be fully qualified with table alias:"
      - "  - channel_group → always use app.channel_group (from app_main_2024 preferred)"
      - "  - channel_code → always use app.channel_code"
      - "  - channel_name → always use app.channel_name"
      - "  - channel_product → always use app.channel_product"
      - "  - channel_type → always use app.channel_type"
      - "  - merchantid, businessname, purpose_code, purpose_label"
      - "  - servicer_boarding, loangroup_boarding, issuingbank"
      - "Forbidden: SELECT channel_group, ... (without alias) when both tables are joined"
      - "Correct: SELECT app.channel_group, ..."
      - "Column ownership is strict: if a column exists in only one table, it MUST be referenced from that table only."
      - "arix_probabilityofbad exists ONLY in stage.loan_main_2024 and MUST ALWAYS be referenced as loan.arix_probabilityofbad."
      
      # ========================================
      # SINGLE TABLE vs MULTI-TABLE QUERIES
      # ========================================
      - "SINGLE TABLE QUERIES: When query uses ONLY ONE table, do NOT use table alias prefixes on columns."
      - "  Example CORRECT: SELECT COUNT(*) FROM stage.app_main_2024 WHERE channel_group ILIKE '%DTM%'"
      - "  Example WRONG: SELECT COUNT(*) FROM stage.app_main_2024 WHERE app.channel_group ILIKE '%DTM%'"
      - "MULTI-TABLE QUERIES: When joining tables, MUST define aliases and use them consistently."
      - "  Example: FROM stage.app_main_2024 app JOIN stage.loan_main_2024 loan ON app.applicationid = loan.loannumber"
      
      # ========================================
      # CTE RULES
      # ========================================
      - "If a query uses CTEs, it MUST start with WITH."
      - "Do not generate CTEs unless the query starts with WITH."
      
      # ========================================
      # DIVISION BY ZERO PROTECTION
      # ========================================
      - "CRITICAL: Always protect against division by zero in percentage calculations."
      - "Use NULLIF(denominator, 0) or CASE WHEN denominator > 0 to avoid division errors."
      - "For approval rates and percentages, if denominator is 0, return 0.0 instead of error."
      - "Formula: CASE WHEN total > 0 THEN (approved::numeric / total) * 100 ELSE 0.0 END"
      - "When calculating any percentage or rate (approval rate, funding rate, conversion rate, etc.)"
      - "ALWAYS use NULLIF(denominator, 0) or CASE to avoid division by zero"
      - "Return 0.0 when denominator is zero"
      - "Example: COALESCE(numerator / NULLIF(denominator, 0), 0.0)"
      
      # ========================================
      # UNION QUERY RULES
      # ========================================
      - "When using UNION/UNION ALL with ORDER BY or LIMIT, wrap each SELECT in parentheses."
      - "Format: (SELECT ... ORDER BY ... LIMIT n) UNION ALL (SELECT ... ORDER BY ... LIMIT n)"
      - "Never write: SELECT ... LIMIT n UNION ALL SELECT ... (This is invalid syntax)"
      
      # ========================================
      # FORBIDDEN COLUMNS
      # ========================================
      - "COLUMNS ENDING WITH '_full' ARE FORBIDDEN AND MUST NEVER BE USED IN GENERATED SQL UNLESS THE USER EXPLICITLY MENTIONS THE '_full' COLUMN NAME IN THE QUESTION."

examples:
      - nl: "How many applications were submitted last month?"
        sql: "SELECT COUNT(*) FROM stage.app_main_2024 WHERE applicationdate >= '2024-12-01' AND applicationdate <= '2024-12-31';"
      
      - nl: "Show FSL applications in August 2024"
        sql: "SELECT COUNT(*) FROM stage.app_main_2024 WHERE channel_group ILIKE '%FSL%' AND applicationdate >= '2024-08-01' AND applicationdate < '2024-09-01';"
      
      - nl: "Is there any dip in app volume for FSL in Aug"
        sql: "SELECT EXTRACT(MONTH FROM applicationdate) AS month, COUNT(applicationid) AS app_count FROM stage.app_main_2024 WHERE channel_group ILIKE '%FSL%' AND applicationdate >= '2024-01-01' AND applicationdate <= '2024-08-31' GROUP BY EXTRACT(MONTH FROM applicationdate) ORDER BY month;"
      
      - nl: "What is total app count for DTM during the last quarter"
        sql: "SELECT COUNT(applicationid) AS total_app_count FROM stage.app_main_2024 WHERE channel_group ILIKE '%DTM%' AND applicationdate >= '2024-10-01' AND applicationdate <= '2024-12-31';"
      
      - nl: "Count of DTM applications in Q3"
        sql: "SELECT COUNT(*) FROM stage.app_main_2024 WHERE channel_group ILIKE '%DTM%' AND applicationdate >= '2024-07-01' AND applicationdate < '2024-10-01';"
      
      - nl: "Show me funded FSL loans with FICO over 700"
        sql: "SELECT COUNT(*) FROM stage.app_main_2024 app JOIN stage.loan_main_2024 loan ON app.applicationid = loan.loannumber WHERE app.channel_group ILIKE '%FSL%' AND loan.fico > 700;"
      
      - nl: "DTC application trend by month in 2024"
        sql: "SELECT EXTRACT(MONTH FROM applicationdate) AS month, COUNT(applicationid) AS app_count FROM stage.app_main_2024 WHERE channel_group ILIKE '%DTC%' AND applicationdate >= '2024-01-01' AND applicationdate <= '2024-12-31' GROUP BY EXTRACT(MONTH FROM applicationdate) ORDER BY month;"

